sonar.projectKey=master-gateway
sonar.projectName=Master Gateway
sonar.sourceEncoding=UTF-8

# Solo backend/src entra al Quality Gate: es lo único con suite de tests y cobertura real
# (~95% medido). Meter frontend/src (sin tests todavía) en el mismo análisis diluía la
# cobertura agregada a ~70% y disparaba code smells a 42 sin que el backend haya empeorado
# — verificado corriendo un SonarQube self-hosted real antes de fijar estos umbrales.
# El frontend igual queda cubierto por `npm audit` en el pipeline (vulnerabilidades de deps).
sonar.sources=backend/src
sonar.exclusions=**/node_modules/**,**/dist/**,**/venv/**,**/__pycache__/**

sonar.tests=backend/test
sonar.test.inclusions=**/*_test.py

sonar.python.coverage.reportPaths=backend/coverage.xml

sonar.qualitygate.wait=true
